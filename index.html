<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cancionero</title>
<style>
:root {
  --bg:#111009;--bg2:#1a1712;--bg3:#221e18;--card:#1e1a14;
  --border:#332d24;--border2:#4a4035;
  --amber:#d4853a;--amber-h:rgba(212,133,58,.16);--amber-l:#e8a050;
  --chord:#d4853a;--sec:#4eaac8;--tab:#5dab5d;
  --text:#f0e6d3;--text2:#9a8a78;--text3:#5a4e42;
  --r:10px;--r2:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;}

/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.logo{font-size:16px;font-weight:600;color:var(--amber);cursor:pointer;display:flex;align-items:center;gap:7px;flex-shrink:0;}
.logo svg{width:20px;height:20px;}
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--r);padding:3px;}
.tab{background:none;border:none;border-radius:7px;padding:5px 14px;font-size:13px;cursor:pointer;color:var(--text2);font-family:inherit;transition:background .15s,color .15s;white-space:nowrap;}
.tab.active{background:var(--card);color:var(--text);font-weight:600;}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn-icon{background:none;border:1px solid var(--border2);color:var(--text2);border-radius:var(--r);padding:5px 11px;font-size:12px;cursor:pointer;font-family:inherit;transition:border-color .15s,color .15s;white-space:nowrap;}
.btn-icon:hover{border-color:var(--amber);color:var(--amber);}
.btn-new{background:var(--amber);color:#fff;border:none;border-radius:var(--r);padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn-new:hover{background:var(--amber-l);}

/* LAYOUT */
.container{max-width:980px;margin:0 auto;padding:28px 20px 60px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;}

/* CARDS */
.artist-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:18px 16px;cursor:pointer;transition:border-color .15s,transform .12s;}
.artist-card:hover{border-color:var(--amber);transform:translateY(-1px);}
.ac-bar{width:24px;height:2px;background:var(--amber);border-radius:1px;margin-bottom:10px;opacity:.7;}
.ac-name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px;}
.ac-count{font-size:12px;color:var(--text3);}
.song-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:15px 16px;cursor:pointer;transition:border-color .15s,transform .12s;}
.song-card:hover{border-color:var(--amber);transform:translateY(-1px);}
.sc-artist{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--amber);margin-bottom:5px;}
.sc-title{font-size:15px;font-weight:600;color:var(--text);line-height:1.3;}
.sc-preview{margin-top:7px;font-family:monospace;font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* SEARCH / SORT */
.search-wrap{position:relative;margin-bottom:16px;}
.search-input{width:100%;padding:9px 12px 9px 34px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;outline:none;font-family:inherit;}
.search-input::placeholder{color:var(--text3);}
.search-input:focus{border-color:var(--amber);}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none;}
.sort-bar{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.sort-label{font-size:12px;color:var(--text3);}
.sort-btn{background:none;border:1px solid var(--border);border-radius:var(--r);padding:4px 12px;font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s;}
.sort-btn.active{background:var(--amber-h);border-color:var(--amber);color:var(--amber);font-weight:600;}

/* ARTIST DETAIL */
.artist-header{margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.artist-header-name{font-size:24px;font-weight:700;color:var(--text);}

/* SONG VIEW */
.back{background:none;border:1px solid var(--border);color:var(--text2);border-radius:var(--r);padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;margin-bottom:16px;transition:border-color .15s,color .15s;}
.back:hover{border-color:var(--amber);color:var(--amber);}
.song-artist-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--amber);margin-bottom:6px;}
.song-title-big{font-size:clamp(22px,4.5vw,38px);font-weight:700;color:var(--text);line-height:1.15;margin-bottom:14px;}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.btn-edit{background:none;border:1px solid var(--amber);color:var(--amber);border-radius:var(--r);padding:5px 14px;font-size:12px;cursor:pointer;font-family:inherit;}
.btn-edit:hover{background:var(--amber-h);}
.btn-del{background:none;border:1px solid #7a3030;color:#c04040;border-radius:var(--r);padding:5px 14px;font-size:12px;cursor:pointer;font-family:inherit;}
.btn-del:hover{background:rgba(180,40,40,.1);}

/* SONG CONTROLS */
.song-controls{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.ctrl-group{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.ctrl-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);white-space:nowrap;}
.ctrl-sep{width:1px;height:18px;background:var(--border);flex-shrink:0;}
.speed-btn{background:none;border:1px solid var(--border);border-radius:var(--r);padding:4px 10px;font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s;}
.speed-btn:hover{border-color:var(--amber);color:var(--amber);}
.speed-btn.active{background:var(--amber);border-color:var(--amber);color:#fff;font-weight:600;}
.wake-btn{background:none;border:1px solid var(--border);border-radius:var(--r);padding:4px 10px;font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s;}
.wake-btn.active{background:var(--amber-h);border-color:var(--amber);color:var(--amber);font-weight:600;}

/* CHORD BOX */
.chord-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:24px;font-family:monospace;font-size:13.5px;line-height:1.85;white-space:pre;overflow-x:auto;}
.lc{color:var(--chord);font-weight:600;}
.ls{color:var(--sec);font-weight:700;}
.lt{color:var(--tab);}
.ll{color:var(--text);}
.le{display:block;height:.45em;}

/* FORMS */
.pgtitle{font-size:22px;font-weight:700;margin-bottom:20px;color:var(--text);}
.card-section{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin-bottom:14px;}
.card-section h3{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:14px;}
.flabel{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text2);margin-bottom:5px;margin-top:12px;}
.flabel:first-of-type{margin-top:0;}
input[type=text],input[type=url],input[type=password],select{width:100%;padding:9px 11px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;outline:none;font-family:inherit;}
select{cursor:pointer;}
select option{background:var(--bg2);}
input:focus,select:focus{border-color:var(--amber);}
textarea{width:100%;padding:11px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;outline:none;font-family:monospace;min-height:380px;resize:vertical;line-height:1.75;}
textarea:focus{border-color:var(--amber);}

/* IMPORT METHOD TABS */
.method-tabs{display:flex;gap:0;margin-bottom:16px;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.method-tab{flex:1;background:none;border:none;padding:9px 12px;font-size:13px;cursor:pointer;color:var(--text2);font-family:inherit;transition:background .15s,color .15s;text-align:center;}
.method-tab:first-child{border-right:1px solid var(--border);}
.method-tab.active{background:var(--amber-h);color:var(--amber);font-weight:600;}
.method-panel{display:none;}
.method-panel.active{display:block;}
.url-row{display:flex;gap:8px;}
.url-row input{flex:1;}
.btn-fetch{background:var(--bg3);color:var(--text);border:1px solid var(--border2);border-radius:var(--r);padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;transition:border-color .15s;}
.btn-fetch:hover{border-color:var(--amber);color:var(--amber);}
.btn-fetch:disabled{opacity:.5;cursor:not-allowed;}
.btn-ai{background:var(--amber);color:#fff;border:none;border-radius:var(--r);padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;}
.btn-ai:disabled{opacity:.5;cursor:not-allowed;}

/* STATUS */
.status{padding:10px 13px;border-radius:var(--r);font-size:13px;margin-top:10px;border:1px solid;}
.st-load{border-color:var(--amber);color:var(--amber);background:var(--amber-h);}
.st-ok{border-color:#3a7a3a;color:#5cb85c;background:rgba(60,140,60,.08);}
.st-err{border-color:#7a3030;color:#c04040;background:rgba(180,40,40,.08);}
.st-info{border-color:var(--border2);color:var(--text2);background:var(--bg3);font-size:12px;line-height:1.5;}

/* BUTTONS */
.btn-row{display:flex;gap:9px;flex-wrap:wrap;margin-top:16px;}
.btn-save{background:var(--amber);color:#fff;border:none;border-radius:var(--r);padding:9px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-save:hover{background:var(--amber-l);}
.btn-cancel{background:none;border:1px solid var(--border2);color:var(--text2);border-radius:var(--r);padding:9px 18px;font-size:14px;cursor:pointer;font-family:inherit;}
.btn-cancel:hover{border-color:var(--text2);}
.confirm-wrap{min-height:220px;background:rgba(0,0,0,.5);border-radius:var(--r2);display:flex;align-items:center;justify-content:center;margin-top:16px;}
.confirm-box{background:var(--card);border:1px solid var(--border2);border-radius:var(--r2);padding:24px;max-width:360px;width:90%;}
.confirm-box h3{font-size:16px;font-weight:700;margin-bottom:8px;}
.confirm-box p{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.5;}
.empty{text-align:center;padding:60px 20px;color:var(--text2);}
.empty-ic{font-size:48px;margin-bottom:14px;}
.empty h3{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px;}
.empty p{font-size:13px;}

/* SETTINGS PANEL */
.settings-panel{position:fixed;top:0;right:0;bottom:0;width:min(340px,100vw);background:var(--bg2);border-left:1px solid var(--border2);z-index:100;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;}
.settings-panel.open{transform:translateX(0);}
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none;}
.settings-overlay.open{display:block;}
.settings-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.settings-header h2{font-size:15px;font-weight:700;}
.close-btn{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:2px 6px;line-height:1;}
.settings-body{padding:20px;overflow-y:auto;flex:1;}
.settings-section{margin-bottom:24px;}
.settings-section h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:12px;}
.settings-hint{font-size:12px;color:var(--text3);line-height:1.6;margin-bottom:10px;}
.btn-full{width:100%;background:none;border:1px solid var(--border2);color:var(--text);border-radius:var(--r);padding:9px 14px;font-size:13px;cursor:pointer;font-family:inherit;text-align:left;transition:border-color .15s;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.btn-full:hover{border-color:var(--amber);color:var(--amber);}
.btn-full-danger{border-color:#7a3030;color:#c04040;}
.btn-full-danger:hover{border-color:#c04040;background:rgba(180,40,40,.08);color:#c04040;}

@media(max-width:520px){
  .topbar{padding:0 12px;gap:8px;}
  .container{padding:16px 12px 60px;}
  .chord-box{font-size:12px;padding:14px;}
  .tab{padding:5px 9px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo" onclick="goHome()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
    </svg>
    Cancionero
  </div>
  <div class="tabs">
    <button class="tab" id="tab-a" onclick="goArtists()">Artistas</button>
    <button class="tab" id="tab-s" onclick="goAllSongs()">Canciones</button>
  </div>
  <div class="topbar-right">
    <button class="btn-icon" onclick="openSettings()">⚙ Ajustes</button>
    <button class="btn-new" onclick="go('add')">+ Agregar</button>
  </div>
</div>

<div class="container"><div id="view"></div></div>

<div class="settings-overlay" id="settingsOverlay" onclick="closeSettings()"></div>
<div class="settings-panel" id="settingsPanel">
  <div class="settings-header">
    <h2>⚙ Ajustes</h2>
    <button class="close-btn" onclick="closeSettings()">×</button>
  </div>
  <div class="settings-body">
    <div class="settings-section">
      <h3>Importar / Exportar</h3>
      <p class="settings-hint">Exportá tus canciones como backup. Importá para restaurarlas en otro dispositivo o después de actualizar el archivo.</p>
      <button class="btn-full" onclick="exportSongs()">⬇ Exportar canciones (.json)</button>
      <button class="btn-full" onclick="document.getElementById('importFile').click()">⬆ Importar canciones (.json)</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importSongs(this)">
      <div id="importMsg"></div>
    </div>
    <div class="settings-section">
      <h3>Datos</h3>
      <p class="settings-hint" id="songCount"></p>
      <button class="btn-full btn-full-danger" onclick="confirmClearAll()">🗑 Borrar todas las canciones</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
let songs = [];
let curView = 'artists', sortMode = 'artist', searchQ = '', fromView = 'artists';

// API key lives ONLY in JS memory — never touches any storage, cookie, or cache
let sessionKey = '', sessionProvider = 'anthropic';

let scrollRaf = null, scrollSpeedIdx = -1;
const SPEEDS = [0.35, 0.9, 1.9, 3.8];
const SPEED_NAMES = ['Lenta', 'Normal', 'Rápida', 'Muy rápida'];
let wakeLock = null, wakeActive = false;

// ── STORAGE ────────────────────────────────────────────────────────────────
function loadData() { try { songs = JSON.parse(localStorage.getItem('cnc_songs') || '[]'); } catch(e) { songs = []; } }
function saveData() { localStorage.setItem('cnc_songs', JSON.stringify(songs)); }

// ── EXPORT / IMPORT ────────────────────────────────────────────────────────
function exportSongs() {
  if (!songs.length) { alert('No hay canciones para exportar.'); return; }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(songs, null, 2)], { type: 'application/json' }));
  a.download = 'cancionero_' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(a.href);
}
function importSongs(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const msg = document.getElementById('importMsg');
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('Formato inválido');
      const valid = data.filter(s => s.id && s.title && s.artist && s.content);
      if (!valid.length) throw new Error('No se encontraron canciones válidas');
      const ids = new Set(songs.map(s => s.id));
      const added = valid.filter(s => !ids.has(s.id));
      const dupes = valid.length - added.length;
      songs = [...added, ...songs]; saveData(); updateSongCount();
      let txt = `✓ ${added.length} canción${added.length!==1?'es':''} importada${added.length!==1?'s':''}.`;
      if (dupes) txt += ` (${dupes} ya existía${dupes!==1?'n':''}, omitida${dupes!==1?'s':''})`;
      msg.innerHTML = `<div class="status st-ok" style="margin-top:8px">${txt}</div>`;
      setTimeout(() => { if (msg) msg.innerHTML = ''; }, 4000);
      goHome();
    } catch(err) {
      msg.innerHTML = `<div class="status st-err" style="margin-top:8px">Error: ${esc(err.message)}</div>`;
    }
    input.value = '';
  };
  reader.readAsText(file);
}
function updateSongCount() {
  const el = document.getElementById('songCount');
  if (el) el.textContent = `${songs.length} canción${songs.length!==1?'es':''} guardada${songs.length!==1?'s':''}.`;
}
function confirmClearAll() {
  if (!songs.length) { alert('No hay canciones guardadas.'); return; }
  if (confirm(`¿Borrar las ${songs.length} canciones? No se puede deshacer.\nTip: exportalas antes como backup.`)) {
    songs = []; saveData(); updateSongCount(); closeSettings(); goHome();
  }
}
function openSettings() {
  document.getElementById('settingsPanel').classList.add('open');
  document.getElementById('settingsOverlay').classList.add('open');
  updateSongCount();
}
function closeSettings() {
  document.getElementById('settingsPanel').classList.remove('open');
  document.getElementById('settingsOverlay').classList.remove('open');
}

// ── CHORD RENDERER ────────────────────────────────────────────────────────
const CHORD_RE = /^([A-G][b#]?(m|maj|min|aug|dim|sus2|sus4|sus|add9|add|maj7|m7b5|m7|7|9|11|13|6|5|4|2)?(\d)?(\/[A-G][b#]?)?\s*)+$/;
const SEC_RE = /^\[.+\]$/;
const TAB_RE = /^[eEBGDAd]\|/;
function classify(l) {
  const t = l.trim();
  if (!t) return 'e';
  if (SEC_RE.test(t)) return 's';
  if (TAB_RE.test(t)) return 't';
  if (CHORD_RE.test(t)) return 'c';
  return 'l';
}
function renderChords(txt) {
  const cls = { c:'lc', s:'ls', t:'lt', l:'ll' };
  return txt.split('\n').map(l => {
    const k = classify(l);
    return k === 'e' ? '<span class="le"></span>\n' : `<span class="${cls[k]}">${esc(l)}</span>\n`;
  }).join('');
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function chordPreview(c) {
  for (const l of c.split('\n')) { if (classify(l)==='c') return esc(l.trim().slice(0,44)); }
  return '';
}

// ── NAVIGATION ────────────────────────────────────────────────────────────
function setTab(t) {
  document.getElementById('tab-a').className = 'tab'+(t==='a'?' active':'');
  document.getElementById('tab-s').className = 'tab'+(t==='s'?' active':'');
}
function goHome() { curView==='all' ? goAllSongs() : goArtists(); }
function goArtists()  { stopScroll(); releaseWake(); curView='artists'; setTab('a'); renderArtists(); }
function goAllSongs() { stopScroll(); releaseWake(); curView='all';     setTab('s'); renderAllSongs(); }
function go(view, id) {
  stopScroll(); releaseWake();
  if (view==='song') fromView = curView;
  curView = view;
  if      (view==='add')           { setTab(''); renderAdd(); }
  else if (view==='song')          renderSong(id);
  else if (view==='edit')          renderEdit(id);
  else if (view==='del')           renderDel(id);
  else if (view==='artist-detail') renderArtistDetail(id);
}

// ── VIEWS ─────────────────────────────────────────────────────────────────
function groupByArtist() {
  const m = {};
  songs.forEach(s => { const k=s.artist.trim(); if(!m[k]) m[k]=[]; m[k].push(s); });
  return m;
}
function renderArtists() {
  const v = document.getElementById('view');
  if (!songs.length) { v.innerHTML = emptyHTML(); return; }
  const map = groupByArtist();
  const artists = Object.keys(map).sort((a,b) => a.localeCompare(b,'es',{sensitivity:'base'}));
  v.innerHTML = `<div class="grid">${artists.map(a=>`
    <div class="artist-card" onclick="go('artist-detail','${esc(a)}')">
      <div class="ac-bar"></div>
      <div class="ac-name">${esc(a)}</div>
      <div class="ac-count">${map[a].length} canción${map[a].length!==1?'es':''}</div>
    </div>`).join('')}</div>`;
}
function renderArtistDetail(artist) {
  const list = songs.filter(s=>s.artist.trim()===artist).sort((a,b)=>a.title.localeCompare(b.title,'es',{sensitivity:'base'}));
  document.getElementById('view').innerHTML = `
    <button class="back" onclick="goArtists()">← Artistas</button>
    <div class="artist-header"><div class="ac-bar"></div><div class="artist-header-name">${esc(artist)}</div></div>
    <div class="grid">${list.map(s=>`
      <div class="song-card" onclick="go('song','${s.id}')">
        <div class="sc-title">${esc(s.title)}</div>
        <div class="sc-preview">${chordPreview(s.content)}</div>
      </div>`).join('')}</div>`;
}
function renderAllSongs() {
  let list = [...songs];
  if (searchQ) list = list.filter(s =>
    s.title.toLowerCase().includes(searchQ.toLowerCase()) ||
    s.artist.toLowerCase().includes(searchQ.toLowerCase())
  );
  if (sortMode==='artist') list.sort((a,b)=>a.artist.localeCompare(b.artist,'es',{sensitivity:'base'})||a.title.localeCompare(b.title,'es',{sensitivity:'base'}));
  else list.sort((a,b)=>a.title.localeCompare(b.title,'es',{sensitivity:'base'}));
  document.getElementById('view').innerHTML = `
    <div class="search-wrap">
      <span class="si">🔍</span>
      <input class="search-input" type="text" placeholder="Buscar por título o artista..." value="${esc(searchQ)}" oninput="searchQ=this.value;renderAllSongs()">
    </div>
    <div class="sort-bar">
      <span class="sort-label">Ordenar:</span>
      <button class="sort-btn${sortMode==='artist'?' active':''}" onclick="sortMode='artist';renderAllSongs()">Por artista</button>
      <button class="sort-btn${sortMode==='title'?' active':''}" onclick="sortMode='title';renderAllSongs()">Por canción</button>
    </div>
    ${list.length===0
      ? (songs.length===0 ? emptyHTML() : `<div class="empty"><div class="empty-ic">🔍</div><h3>Sin resultados</h3><p>Probá con otro término</p></div>`)
      : `<div class="grid">${list.map(s=>`
          <div class="song-card" onclick="go('song','${s.id}')">
            <div class="sc-artist">${esc(s.artist)}</div>
            <div class="sc-title">${esc(s.title)}</div>
            <div class="sc-preview">${chordPreview(s.content)}</div>
          </div>`).join('')}</div>`}`;
}

// ── CRUD ──────────────────────────────────────────────────────────────────
function doSave() {
  const a=document.getElementById('fArtist').value.trim(), t=document.getElementById('fTitle').value.trim(), c=document.getElementById('fContent').value.trim();
  if (!a||!t||!c) { alert('Completá todos los campos.'); return; }
  songs.unshift({id:Date.now().toString(),artist:a,title:t,content:c}); saveData(); fromView='artists'; go('song',songs[0].id);
}
function doUpdate(id) {
  const a=document.getElementById('fArtist').value.trim(), t=document.getElementById('fTitle').value.trim(), c=document.getElementById('fContent').value.trim();
  if (!a||!t||!c) { alert('Completá todos los campos.'); return; }
  const i=songs.findIndex(s=>s.id===id); if (i>=0) songs[i]={...songs[i],artist:a,title:t,content:c};
  saveData(); go('song',id);
}
function doDelete(id) { songs=songs.filter(s=>s.id!==id); saveData(); goHome(); }

// ── AUTO FETCH (CORS proxy — no key needed) ───────────────────────────────
async function doAutoFetch() {
  const url = document.getElementById('urlAutoIn').value.trim();
  if (!url) { alert('Ingresá una URL primero.'); return; }
  const btn=document.getElementById('autoBtn'), st=document.getElementById('autoStatus');
  btn.disabled=true; btn.textContent='Extrayendo...';
  st.innerHTML='<div class="status st-load">⏳ Obteniendo la página...</div>';
  try {
    let html='', ok=false;
    for (const proxy of ['https://corsproxy.io/?'+encodeURIComponent(url),'https://api.allorigins.win/raw?url='+encodeURIComponent(url)]) {
      try {
        const r=await fetch(proxy,{signal:AbortSignal.timeout(10000)});
        if (r.ok) { html=await r.text(); ok=true; break; }
      } catch(e) { /* try next proxy */ }
    }
    if (!ok||!html) throw new Error('No se pudo obtener la página. Probá con la opción "Con IA" o ingresá los datos manualmente.');

    const doc=new DOMParser().parseFromString(html,'text/html');

    // Title
    let title=(doc.querySelector('h1')?.textContent||'').replace(/\s*\(acordes\).*$/i,'').replace(/\s*\(chords\).*$/i,'').trim();

    // Artist — try multiple selectors
    let artist='';
    for (const sel of ['h2 a','h2','[class*="artist"] a','[class*="artist"]','[itemprop="byArtist"]']) {
      const el=doc.querySelector(sel);
      if (el) { artist=el.textContent.replace(/\s+/g,' ').trim(); break; }
    }

    // Content — <pre> is standard for chord sites
    let content='';
    const pre=doc.querySelector('pre');
    if (pre) content=(pre.innerText||pre.textContent||'').trim();

    // Fallback: look for common chord/lyric containers
    if (!content) {
      for (const sel of ['[class*="chord"]','[class*="cifra"]','[class*="lyric"]','[id*="chord"]','[id*="lyric"]','[id*="tab"]']) {
        const el=doc.querySelector(sel);
        if (el&&el.textContent.trim().length>100) { content=(el.innerText||el.textContent||'').trim(); break; }
      }
    }

    if (!content) throw new Error('No se encontró el contenido de acordes. Probá con la opción "Con IA".');

    document.getElementById('fArtist').value=artist;
    document.getElementById('fTitle').value=title;
    document.getElementById('fContent').value=content;
    st.innerHTML='<div class="status st-ok">✓ Contenido extraído. Revisá los datos y guardá.</div>';
  } catch(e) {
    st.innerHTML=`<div class="status st-err">✗ ${esc(e.message)}</div>`;
  }
  btn.disabled=false; btn.textContent='Extraer';
}

// ── AI FETCH (key in memory only, never stored anywhere) ──────────────────
const PROVIDERS = {
  anthropic: {
    endpoint: 'https://api.anthropic.com/v1/messages',
    headers: k => ({'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'}),
    body: url => JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,tools:[{type:'web_search_20250305',name:'web_search'}],system:'You are a music data extractor. Fetch the given URL and extract the song. Return ONLY a raw JSON object (no markdown, no backticks) with fields: "title" (string), "artist" (string), "content" (string — full chord+lyrics block preserving all formatting: [Section] headers, chords above lyrics, tab notation).',messages:[{role:'user',content:'Extract song from: '+url}]}),
    parse: d => { if (d.error) throw new Error(d.error.message); return (d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join(''); }
  },
  openai: {
    endpoint: 'https://api.openai.com/v1/chat/completions',
    headers: k => ({'Content-Type':'application/json','Authorization':'Bearer '+k}),
    body: url => JSON.stringify({model:'gpt-4o-mini',max_tokens:4000,messages:[{role:'system',content:'You are a music data extractor. When given a URL, fetch its content and extract the song. Return ONLY a raw JSON object (no markdown) with fields: "title", "artist", "content" (full chord+lyrics block preserving formatting).'},{role:'user',content:'Extract song from: '+url}]}),
    parse: d => { if (d.error) throw new Error(d.error.message); return d.choices?.[0]?.message?.content||''; }
  },
  deepseek: {
    endpoint: 'https://api.deepseek.com/v1/chat/completions',
    headers: k => ({'Content-Type':'application/json','Authorization':'Bearer '+k}),
    body: url => JSON.stringify({model:'deepseek-chat',max_tokens:4000,messages:[{role:'system',content:'You are a music data extractor. When given a URL, fetch its content and extract the song. Return ONLY a raw JSON object (no markdown) with fields: "title", "artist", "content" (full chord+lyrics block preserving formatting).'},{role:'user',content:'Extract song from: '+url}]}),
    parse: d => { if (d.error) throw new Error(d.error.message); return d.choices?.[0]?.message?.content||''; }
  },
  google: {
    endpoint: k => `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${k}`,
    headers: () => ({'Content-Type':'application/json'}),
    body: url => JSON.stringify({contents:[{parts:[{text:`You are a music data extractor. Fetch this URL and extract the song. Return ONLY a raw JSON object (no markdown) with fields: "title", "artist", "content" (full chord+lyrics block preserving all formatting). URL: ${url}`}]}]}),
    parse: d => { if (d.error) throw new Error(d.error.message); return d.candidates?.[0]?.content?.parts?.[0]?.text||''; }
  }
};

async function doAiFetch() {
  const url = document.getElementById('urlAiIn').value.trim();
  const key = document.getElementById('aiKeyIn').value.trim();
  const provider = document.getElementById('aiProvider').value;
  if (!url) { alert('Ingresá una URL primero.'); return; }
  if (!key) { alert('Ingresá tu API key primero.'); return; }

  // Store in memory only for convenience within this session — never persisted
  sessionKey = key; sessionProvider = provider;

  const btn=document.getElementById('aiBtn'), st=document.getElementById('aiStatus');
  btn.disabled=true; btn.textContent='Procesando...';
  st.innerHTML='<div class="status st-load">🤖 Extrayendo con IA...</div>';
  try {
    const p = PROVIDERS[provider];
    const endpoint = typeof p.endpoint==='function' ? p.endpoint(key) : p.endpoint;
    const res = await fetch(endpoint,{method:'POST',headers:p.headers(key),body:p.body(url)});
    const data = await res.json();
    const txt = p.parse(data);
    if (!txt) throw new Error('Sin respuesta del modelo');
    const m = txt.replace(/```json|```/g,'').trim().match(/\{[\s\S]*\}/);
    if (!m) throw new Error('No se pudo parsear la respuesta');
    const song = JSON.parse(m[0]);
    document.getElementById('fArtist').value  = song.artist  || '';
    document.getElementById('fTitle').value   = song.title   || '';
    document.getElementById('fContent').value = song.content || '';
    st.innerHTML='<div class="status st-ok">✓ Canción extraída. Revisá los datos y guardá.</div>';
  } catch(e) {
    st.innerHTML=`<div class="status st-err">✗ Error: ${esc(e.message)}</div>`;
  }
  btn.disabled=false; btn.textContent='Extraer con IA';
}

// ── AUTOSCROLL ────────────────────────────────────────────────────────────
function toggleScroll(idx) {
  if (scrollSpeedIdx===idx) { stopScroll(); return; }
  stopScroll(); scrollSpeedIdx=idx;
  const px=SPEEDS[idx];
  function frame() {
    window.scrollBy(0,px);
    if (window.scrollY+window.innerHeight>=document.body.scrollHeight-4) { stopScroll(); updateScrollUI(); return; }
    scrollRaf=requestAnimationFrame(frame);
  }
  scrollRaf=requestAnimationFrame(frame); updateScrollUI();
}
function stopScroll() { if(scrollRaf){cancelAnimationFrame(scrollRaf);scrollRaf=null;} scrollSpeedIdx=-1; updateScrollUI(); }
function updateScrollUI() {
  SPEEDS.forEach((_,i)=>{ const b=document.getElementById('spd'+i); if(b) b.className='speed-btn'+(scrollSpeedIdx===i?' active':''); });
  const sb=document.getElementById('spdStop'); if(sb) sb.className='speed-btn'+(scrollSpeedIdx===-1?' active':'');
}

// ── WAKE LOCK ─────────────────────────────────────────────────────────────
async function toggleWake() { wakeActive ? releaseWake() : await requestWake(); updateWakeUI(); }
async function requestWake() {
  if ('wakeLock' in navigator) {
    try { wakeLock=await navigator.wakeLock.request('screen'); wakeActive=true; wakeLock.addEventListener('release',()=>{wakeActive=false;updateWakeUI();}); }
    catch(e) { wakeActive=false; }
  } else { alert('Tu navegador no soporta Wake Lock. Activá "No apagar pantalla" desde la configuración del sistema.'); }
}
function releaseWake() { if(wakeLock){wakeLock.release();wakeLock=null;} wakeActive=false; }
function updateWakeUI() {
  const b=document.getElementById('wakeBtn');
  if(b){b.className='wake-btn'+(wakeActive?' active':'');b.innerHTML=wakeActive?'☀ Pantalla activa: ON':'☀ Mantener activa';}
}

// ── INIT ──────────────────────────────────────────────────────────────────
loadData(); setTab('a'); renderArtists();
